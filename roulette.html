<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎡 Рулетка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a0a0a, #3a1a1a, #1a0a0a);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 20px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            transition: 0.3s;
        }
        .back-btn:active { transform: scale(0.95); }
        h2 { font-size: 28px; margin-bottom: 10px; }
        .balance {
            font-size: 24px;
            color: #f7d44a;
            margin-bottom: 20px;
        }

        /* ===== КОЛЕСО РУЛЕТКИ ===== */
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 60px rgba(231, 76, 60, 0.2), 0 0 120px rgba(231, 76, 60, 0.1);
            border: 4px solid #f7d44a;
        }

        .wheel.spinning {
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0;
            left: 50%;
            transform-origin: 0% 100%;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #f7d44a, #b8860b);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 30px rgba(247,212,74,0.3);
            z-index: 10;
        }

        .wheel-center::after {
            content: '★';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #1a1a2e;
        }

        /* Стрелка */
        .wheel-arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #f7d44a;
            z-index: 20;
            filter: drop-shadow(0 0 20px rgba(247,212,74,0.5));
            text-shadow: 0 0 30px rgba(247,212,74,0.3);
        }

        /* ===== РЕЗУЛЬТАТ ===== */
        .result {
            font-size: 28px;
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .result .number {
            font-size: 48px;
            font-weight: bold;
            animation: popResult 0.5s ease-out;
        }
        .result .color {
            font-size: 20px;
            margin-top: 5px;
        }
        .result .color.red { color: #e74c3c; }
        .result .color.black { color: #bdc3c7; }
        .result .color.green { color: #2ecc71; }

        @keyframes popResult {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== СТАВКА ===== */
        .bet-input {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }
        .bet-input input {
            width: 120px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bet-input input:focus { outline: none; border-color: #f7d44a; }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-red { background: #e74c3c; color: white; box-shadow: 0 4px 20px rgba(231,76,60,0.3); }
        .btn-black { background: #2c3e50; color: white; box-shadow: 0 4px 20px rgba(44,62,80,0.3); }
        .btn-gold { background: #f7d44a; color: #1a1a2e; box-shadow: 0 4px 20px rgba(247,212,74,0.3); }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            display: none;
            z-index: 999;
            max-width: 90%;
        }
        .toast.show { display: block; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown {
            from { top: -100px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
        .footer { margin-top: 20px; font-size: 12px; opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Назад</a>
    
    <h2>🎡 Рулетка</h2>
    <div class="balance" id="balanceDisplay">💰 1000</div>
    
    <div class="wheel-container">
        <div class="wheel-arrow">▼</div>
        <div class="wheel" id="wheel">
            <!-- Сегменты будут созданы через JS -->
        </div>
        <div class="wheel-center"></div>
    </div>
    
    <div class="result" id="rouletteResult">
        <div class="number">🎯</div>
        <div class="color">Сделай ставку</div>
    </div>
    
    <div class="bet-input">
        <label>💰 Ставка:</label>
        <input type="number" id="rouletteBet" value="50" min="10" step="10">
    </div>
    
    <div class="buttons">
        <button class="btn-red" onclick="spinRoulette('red')" id="btnRed">🔴 Красное (x2)</button>
        <button class="btn-black" onclick="spinRoulette('black')" id="btnBlack">⚫ Чёрное (x2)</button>
        <button class="btn-gold" onclick="spinRoulette('number')" id="btnNumber">🎯 Число (x35)</button>
    </div>
    
    <div class="footer">Красное/Чёрное = x2 | Число = x35</div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ===== БАЛАНС =====
    let balance = parseInt(localStorage.getItem('casinoBalance')) || 1000;
    updateDisplay();
    
    function updateDisplay() {
        document.getElementById('balanceDisplay').textContent = '💰 ' + balance;
        localStorage.setItem('casinoBalance', balance);
    }
    
    function showToast(msg, isWin) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.borderColor = isWin ? 'rgba(46,204,113,0.5)' : 'rgba(231,76,60,0.5)';
        t.classList.add('show');
        clearTimeout(t._timeout);
        t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== СОЗДАНИЕ КОЛЕСА =====
    const numbers = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
    const colors = ['green','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black','red','black'];
    
    const wheel = document.getElementById('wheel');
    const segmentCount = numbers.length;
    const angleStep = 360 / segmentCount;
    
    numbers.forEach((num, i) => {
        const seg = document.createElement('div');
        seg.className = 'wheel-segment';
        const color = colors[i];
        seg.style.backgroundColor = color === 'red' ? '#e74c3c' : color === 'black' ? '#2c3e50' : '#2ecc71';
        seg.style.transform = `rotate(${i * angleStep}deg)`;
        seg.innerHTML = `<span style="transform: rotate(90deg); font-size: 11px; margin-left: 20px;">${num}</span>`;
        wheel.appendChild(seg);
    });

    // ===== РУЛЕТКА =====
    let isSpinning = false;
    let currentRotation = 0;

    function spinRoulette(betType) {
        if (isSpinning) return;
        const bet = parseInt(document.getElementById('rouletteBet').value) || 50;
        if (balance < bet) { showToast('❌ Недостаточно монет!', false); return; }
        
        isSpinning = true;
        document.getElementById('btnRed').disabled = true;
        document.getElementById('btnBlack').disabled = true;
        document.getElementById('btnNumber').disabled = true;
        
        balance -= bet;
        updateDisplay();
        
        const num = Math.floor(Math.random() * 37);
        const color = num === 0 ? 'зелёный' : (num % 2 === 0 ? 'красный' : 'чёрный');
        
        const winIndex = numbers.indexOf(num);
        const winAngle = winIndex * angleStep + angleStep / 2;
        const extraSpins = 5 + Math.floor(Math.random() * 5);
        const targetRotation = 360 * extraSpins + (360 - winAngle);
        
        currentRotation += targetRotation;
        wheel.style.transform = `rotate(${currentRotation}deg)`;
        wheel.classList.add('spinning');
        
        setTimeout(() => {
            wheel.classList.remove('spinning');
            
            let isWin = false, winAmount = 0;
            if (betType === 'red' && color === 'красный') { isWin = true; winAmount = bet * 2; }
            else if (betType === 'black' && color === 'чёрный') { isWin = true; winAmount = bet * 2; }
            else if (betType === 'number') {
                const guess = prompt('Введи число от 0 до 36:', '7');
                if (guess !== null && parseInt(guess) === num) {
                    isWin = true;
                    winAmount = bet * 35;
                }
            }
            
            const colorClass = color === 'красный' ? 'red' : (color === 'чёрный' ? 'black' : 'green');
            document.getElementById('rouletteResult').innerHTML = 
                `<div class="number">${num}</div>
                 <div class="color ${colorClass}">${color.toUpperCase()}</div>`;
            
            if (isWin) {
                balance += winAmount;
                updateDisplay();
                showToast('🎉 Выиграл ' + winAmount + ' монет!', true);
            } else {
                showToast('😢 Проиграл ' + bet + ' монет', false);
            }
            
            isSpinning = false;
            document.getElementById('btnRed').disabled = false;
            document.getElementById('btnBlack').disabled = false;
            document.getElementById('btnNumber').disabled = false;
        }, 4200);
    }
</script>
</body>
</html>
